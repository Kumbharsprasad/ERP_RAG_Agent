name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    env:
      QDRANT_URL: http://localhost:6333
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Parsers Tests
        run: python -m unittest test_parsers.py

      - name: Run Vector Pipeline Tests
        run: python -m unittest test_vector_pipeline.py

      - name: Run LangGraph Agent Tests
        run: python -m unittest test_graph.py

      - name: Run API Tests
        run: python -m unittest test_api.py
